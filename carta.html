<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Miranda ❤️ Mariano</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle, #050505, #000);
    overflow: hidden;
    font-family: Arial;
}

/* TEXTO LATIDO */
#frase {
    position: absolute;
    top: 50%;
    width: 100%;
    text-align: center;
    font-size: 50px;
    color: white;
    transform: translateY(-50%);
    animation: latido 1.2s infinite;
}

/* LATIDO REAL */
@keyframes latido {
    0%   { transform: translateY(-50%) scale(1); }
    25%  { transform: translateY(-50%) scale(1.2); }
    40%  { transform: translateY(-50%) scale(1); }
    60%  { transform: translateY(-50%) scale(1.15); }
    100% { transform: translateY(-50%) scale(1); }
}

/* ESTRELLAS */
.estrella {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    opacity: 0.7;
    animation: parpadeo 2s infinite alternate;
}

@keyframes parpadeo {
    from {opacity: 0.2;}
    to {opacity: 1;}
}

/* CORAZONES */
.corazon {
    position: absolute;
    color: pink;
    animation: flotar 6s linear infinite;
}

@keyframes flotar {
    from {
        transform: translateY(100vh) scale(1);
        opacity: 1;
    }
    to {
        transform: translateY(-10vh) scale(1.5);
        opacity: 0;
    }
}
</style>
</head>

<body>

<div id="frase">Miranda ❤️ Mariano</div>

<script>

/* ESTRELLAS */
for (let i = 0; i < 120; i++) {
    let estrella = document.createElement("div");
    estrella.className = "estrella";
    estrella.style.top = Math.random() * 100 + "vh";
    estrella.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(estrella);
}

/* CORAZONES */
function crearCorazon() {
    let c = document.createElement("div");
    c.className = "corazon";
    c.innerHTML = "❤️";
    c.style.left = Math.random() * 100 + "vw";
    c.style.fontSize = (Math.random() * 20 + 15) + "px";

    document.body.appendChild(c);

    setTimeout(() => {
        c.remove();
    }, 6000);
}

setInterval(crearCorazon, 250);

</script>

</body>
</html>
